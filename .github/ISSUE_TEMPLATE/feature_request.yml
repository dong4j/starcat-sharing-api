name: Feature Request
description: 提出新功能建议
title: "[Feature]: "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        感谢你提出功能建议！请描述清楚你想解决的问题和期望的方案。

  - type: textarea
    id: problem
    attributes:
      label: 需求背景
      description: 这个功能要解决什么问题？
      placeholder: |
        当前分享页面缺少暗黑模式支持
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 你希望如何实现？给出具体的设计
      placeholder: |
        在 share.html 中添加 dark 主题支持，通过 CSS 变量切换
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 是否有其他可选方案？
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 截图、相关链接、参考实现等
    validations:
      required: false
